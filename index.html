<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Digital Space</title>
    <style>
        /* --- Reset & Global Styles --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a; /* Dark Blue Background */
            color: #f8fafc;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: opacity 0.3s ease;
        }

        a:hover {
            opacity: 0.8;
        }

        /* --- Header / Navigation --- */
        header {
            background-color: #1e293b;
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #38bdf8; /* Light blue accent */
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        .nav-links li a {
            font-weight: 500;
            font-size: 0.95rem;
        }

        /* --- Hero Section --- */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 4rem 1rem;
        }

        .profile-placeholder {
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, #334155, #475569);
            border-radius: 50%;
            margin-bottom: 1.5rem;
            border: 4px solid #38bdf8;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        }

        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: -webkit-linear-gradient(#38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            color: #94a3b8;
            font-size: 1.1rem;
            max-width: 600px;
        }

        /* --- Grid Layout --- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem 4rem 2rem;
            flex: 1; /* Pushes footer down */
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 Columns on Desktop */
            gap: 25px;
        }

        /* --- Cards --- */
        .card {
            background-color: #1e293b;
            border-radius: 16px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .card-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .card h3 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        /* Colorful Variants */
        .card.youtube { background: linear-gradient(145deg, #cc181e, #920b10); }
        .card.replit { background: linear-gradient(145deg, #F26207, #c44e05); }
        .card.projects { background: linear-gradient(145deg, #3B82F6, #1d4ed8); }
        .card.notes { background: linear-gradient(145deg, #10B981, #059669); }
        .card.social { background: linear-gradient(145deg, #8B5CF6, #6d28d9); }
        .card.learning { background: linear-gradient(145deg, #F59E0B, #d97706); }

        /* --- Footer --- */
        footer {
            background-color: #020617;
            color: #64748b;
            text-align: center;
            padding: 1.5rem;
            font-size: 0.9rem;
            margin-top: auto;
        }

        /* --- Responsive Design (Mobile) --- */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }

            .nav-links {
                gap: 15px;
                font-size: 0.9rem;
            }

            .hero h1 {
                font-size: 2rem;
            }

            .grid {
                grid-template-columns: 1fr; /* 1 Column on Mobile */
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="logo">My Digital Space</div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </header>

    <!-- Main Content -->
    <main class="container">
        
        <!-- Hero Section -->
        <section class="hero">
            <div class="profile-placeholder"></div>
            <h1>Welcome to my App</h1>
            <p>Your personal hub for productivity and fun.</p>
        </section>

        <!-- Grid Section -->
        <section class="grid">
            <!-- Card 1: YouTube -->
            <div class="card youtube">
                <div class="card-icon">▶️</div>
                <h3>YouTube</h3>
            </div>

            <!-- Card 2: Replit -->
            <div class="card replit">
                <div class="card-icon">⚡</div>
                <h3>Replit</h3>
            </div>

            <!-- Card 3: Projects -->
            <div class="card projects">
                <div class="card-icon">💻</div>
                <h3>Projects</h3>
            </div>

            <!-- Card 4: Notes -->
            <div class="card notes">
                <div class="card-icon">📝</div>
                <h3>Notes</h3>
            </div>

            <!-- Card 5: Social -->
            <div class="card social">
                <div class="card-icon">🌐</div>
                <h3>Social</h3>
            </div>

            <!-- Card 6: Learning -->
            <div class="card learning">
                <div class="card-icon">📚</div>
                <h3>Learning</h3>
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer>
        <p>Made with AI</p>
    </footer>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Digital Space - Secure</title>
    <style>
        /* --- Global Styles --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #0f172a; color: #f8fafc; overflow: hidden; }

        /* --- Login Overlay --- */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; display: flex; align-items: center; justify-content: center;
            z-index: 9999; transition: 0.5s;
        }
        .login-box {
            background: #1e293b; padding: 2.5rem; border-radius: 20px;
            text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 90%; max-width: 400px;
        }
        .login-box h2 { margin-bottom: 1.5rem; color: #38bdf8; }
        .login-input {
            width: 100%; padding: 12px; margin-bottom: 1rem;
            border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white;
        }
        .btn-login {
            width: 100%; padding: 12px; border-radius: 8px; border: none;
            background: #38bdf8; color: #0f172a; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-google {
            width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #94a3b8;
            background: white; color: #334155; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        /* --- Dashboard (Hidden by default) --- */
        #main-content { display: none; overflow-y: auto; height: 100vh; }

        /* --- Your Original CSS Styles --- */
        header { background-color: #1e293b; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: bold; color: #38bdf8; }
        .hero { text-align: center; padding: 3rem 1rem; }
        .profile-placeholder { width: 120px; height: 120px; background: linear-gradient(135deg, #334155, #475569); border-radius: 50%; margin: 0 auto 1.5rem; border: 4px solid #38bdf8; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 2rem; max-width: 1200px; margin: 0 auto; }
        .card { background-color: #1e293b; border-radius: 16px; padding: 2rem; text-align: center; transition: 0.3s; cursor: pointer; text-decoration: none; color: white; border: 1px solid rgba(255,255,255,0.05); }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); filter: brightness(1.2); }
        .card.youtube { background: linear-gradient(145deg, #cc181e, #920b10); }
        .card.notes { background: linear-gradient(145deg, #10B981, #059669); }
        .card.learning { background: linear-gradient(145deg, #F59E0B, #d97706); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>Welcome Back</h2>
            <input type="email" class="login-input" placeholder="Email Address">
            <input type="password" class="login-input" placeholder="Password">
            <button class="btn-login" onclick="login()">Login</button>
            <button class="btn-google" onclick="login()">
                <img src="https://www.google.com/favicon.ico" width="18"> Sign in with Google
            </button>
        </div>
    </div>

    <div id="main-content">
        <header>
            <div class="logo">My Digital Space</div>
        </header>

        <section class="hero">
            <div class="profile-placeholder"></div>
            <h1>Secure Dashboard</h1>
            <p>Your personal hub is now unlocked.</p>
        </section>

        <div class="grid">
            <a href="https://youtube.com" target="_blank" class="card youtube">
                <div style="font-size: 2rem;">▶️</div>
                <h3>YouTube</h3>
            </a>
            <a href="https://keep.google.com" target="_blank" class="card notes">
                <div style="font-size: 2rem;">📝</div>
                <h3>Google Keep</h3>
            </a>
            <a href="https://www.w3schools.com" target="_blank" class="card learning">
                <div style="font-size: 2rem;">📚</div>
                <h3>W3Schools</h3>
            </a>
        </div>
    </div>

    <script>
        function login() {
            // Login screen ko chhupa do aur main content dikha do
            document.getElementById('login-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                document.body.style.overflow = 'auto';
            }, 500);
        }
    </script>
</body>
</html>

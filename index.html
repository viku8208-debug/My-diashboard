<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Secure Digital Space</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #0f172a; color: #f8fafc; overflow-x: hidden; }
        #auth-overlay { position: fixed; inset: 0; background: #0f172a; z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: #1e293b; padding: 2rem; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #334155; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .auth-input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; }
        .auth-btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; transition: 0.3s; }
        .login-btn { background: #38bdf8; color: #0f172a; }
        .google-btn { background: white; color: #334155; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        #dashboard { display: none; }
        header { background-color: #1e293b; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; padding: 2rem; max-width: 1200px; margin: 0 auto; }
        .card { background-color: #1e293b; border-radius: 16px; padding: 2rem; text-align: center; text-decoration: none; color: white; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .card:hover { transform: translateY(-8px); filter: brightness(1.1); }
        .card.youtube { background: linear-gradient(145deg, #cc181e, #920b10); }
        .card.replit { background: linear-gradient(145deg, #F26207, #c44e05); }
        #cookie-banner { position: fixed; bottom: -100px; left: 0; width: 100%; background: #1e293b; padding: 15px; text-align: center; border-top: 2px solid #38bdf8; transition: 0.5s; z-index: 3000; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-box" id="login-container">
            <h2 style="color:#38bdf8; margin-bottom:1rem;">Secure Login</h2>
            <input type="email" id="email" class="auth-input" placeholder="Email Address">
            <input type="password" id="pass" class="auth-input" placeholder="Password">
            <button class="auth-btn login-btn" onclick="handleEmailAuth()">Login / Signup</button>
            <button class="auth-btn google-btn" onclick="handleGoogleLogin()">
                <img src="https://www.google.com/favicon.ico" width="18"> Continue with Google
            </button>
        </div>
    </div>

    <div id="dashboard">
        <header>
            <div style="font-size:1.5rem; font-weight:bold; color:#38bdf8;">My Digital Space</div>
            <button onclick="handleLogout()" style="background:none; border:1px solid #ef4444; color:#ef4444; padding:5px 10px; border-radius:5px; cursor:pointer;">Logout</button>
        </header>
        <main class="grid">
            <a href="https://youtube.com" target="_blank" class="card youtube"><h3>▶️ YouTube</h3></a>
            <a href="https://replit.com" target="_blank" class="card replit"><h3>⚡ Replit</h3></a>
            <a href="https://keep.google.com" target="_blank" class="card" style="background:linear-gradient(145deg, #10B981, #059669)"><h3>📝 Notes</h3></a>
        </main>
    </div>

    <div id="cookie-banner">
        We use cookies for security. <button onclick="acceptCookies()" style="background:#38bdf8; border:none; padding:5px 10px; border-radius:4px; margin-left:10px; cursor:pointer;">Allow</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC4dDH00h0sXai8xdF38AXrz6xI82pZN_A",
            authDomain: "my-dashboard-b690b.firebaseapp.com",
            projectId: "my-dashboard-b690b",
            storageBucket: "my-dashboard-b690b.firebasestorage.app",
            messagingSenderId: "357200937143",
            appId: "1:357200937143:web:d9f22a05ee4339cf2a0d32",
            measurementId: "G-VLPYHZZR6Y"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const provider = new GoogleAuthProvider();

        window.handleGoogleLogin = () => signInWithPopup(auth, provider).catch(e => alert(e.message));

        window.handleEmailAuth = () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            signInWithEmailAndPassword(auth, email, pass).catch(() => {
                createUserWithEmailAndPassword(auth, email, pass).catch(e => alert(e.message));
            });
        };

        window.handleLogout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                if(!localStorage.getItem('cookieOk')) document.getElementById('cookie-banner').style.bottom = '0';
            } else {
                document.getElementById('auth-overlay').style.display = 'flex';
                document.getElementById('dashboard').style.display = 'none';
            }
        });

        window.acceptCookies = () => {
            localStorage.setItem('cookieOk', 'true');
            document.getElementById('cookie-banner').style.bottom = '-100px';
        };
    </script>
</body>
</html>
